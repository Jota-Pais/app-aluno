<!doctype html>
<html lang="en" style="font-family: Arial, sans-serif">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>

<body>
  <aside>
    <p>
      Educação não é aprendizado de fatos, mas o treinamento da mente para
      pensar.
      <span>Albert Einstein</span>
    </p>
  </aside>

  <main>
    <h1>Bem-vindo de volta</h1>
    <p>
      Por favor, insira suas credenciais para acessar seu painel acadêmico
    </p>

    <form action="/enviar" method="post">
      <div>
        <label for="email">Endereço de e-mail</label>
        <input id="email" name="email" type="text" placeholder="usuario@exemplo.com" />
      </div>

      <div>
        <label>Senha</label>
        <input type="password" />
      </div>
      <div>
        <button type="submit">Entrar</button>
      </div>
      <div>
        <a href="recuperar-senha.html">Esqueceu sua senha?</a>
      </div>
    </form>

    <p>
      Não tem conta? <a href="cadastro-usuario.html">Registre-se agora</a>
    </p>
  </main>
</body>

</html>
